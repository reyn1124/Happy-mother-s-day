<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mother earth</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <!-- The Card Container -->
        <div class="card-container" id="card">
            
            <!-- Front of the card (The "Open Me" part) -->
            <div class="card-front">
                <div class="ornament">✿</div>
                <h1>Para sayo mudraaa</h1>
                <p>May special message ako sa loob...</p>
                <button class="open-btn">Click to Open</button>
            </div>

            <!-- Back/Inside of the card (The message) -->
            <div class="card-inside">
                <h2>Happy Mother's Day!</h2>
                <div class="message-content">
                    <p>Ma, thank you sa lahat ng sakripisyo at pagmamahal. Salamat at palagi kang andyan para bumangon at asikasuhin kami sa araw araw. You're the best! Sana magustuhan mo toh kahit simple lang.
                </p>
                    <p class="sig">Your makulit na anak, <br> Rain</p>
                </div>
                <button class="close-btn">Close</button>
            </div>
            
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const openBtn = document.querySelector('.open-btn');
        const closeBtn = document.querySelector('.close-btn');

        openBtn.addEventListener('click', () => {
            card.classList.add('is-open');
        });

        closeBtn.addEventListener('click', () => {
            card.classList.remove('is-open');
        });
    </script>
</body>
</html>
