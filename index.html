<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <strong>Para sa Pinakamahalagang Babae,</strong>
                        <p>Happy Mother's Day! Salamat sa lahat ng pag-aalaga, pagmamahal, at suporta. You are the heart of our home.</p>
                        <p class="signature">Nagmamahal, <br> Rain</p>
                    </div>
                </div>
            </div>
            <div class="heart"></div>
        </div>
    </div>

    <script>
        const envelope = document.querySelector('.envelope-wrapper');
        envelope.addEventListener('click', () => {
            envelope.classList.toggle('flap');
        });
    </script>
</body>
</html>
